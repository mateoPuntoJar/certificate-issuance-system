<div class="flex justify-center items-center min-h-screen bg-base-200">
    <div class="overflow-x-auto">
      <table class="table table-zebra table-bordered bg-white shadow-xl">
        <!-- head -->
        <thead>
          <tr>
            <th>
              <label>
                <input type="checkbox" class="checkbox" />
              </label>
            </th>
            <th>Name</th>
            <th>Email</th>
            <th>Estado</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          @for(item of user(); track $index){
          <!-- row 1 -->
          <tr>
            <th>
              <label>
                <input type="checkbox" class="checkbox" />
              </label>
            </th>
            <td>
              <div class="flex items-center gap-3">
                <div class="avatar">
                  <div class="mask mask-squircle h-12 w-12">
                    <img
                      src="https://img.daisyui.com/images/profile/demo/2@94.webp"
                      alt="Avatar Tailwind CSS Component" />
                  </div>
                </div>
                <div>
                  <div class="font-bold">{{item.name}}</div>
                  <div class="text-sm opacity-50">{{item.locacion}}</div>
                </div>
              </div>
            </td>
            <td>
             <p> {{item.email}}</p>
              <br />
              <span class="badge badge-ghost badge-sm">Desktop Support Technician</span>
            </td>
            <td>{{item.estado}}</td>
            <th>
              <button class="btn btn-ghost btn-xs" (click)="openDetails(item)">Detalles del Estudiante</button>
            </th>
          </tr>
          }
        </tbody>
        <!-- foot -->
        <tfoot>
          <tr>
            <th></th>
            <th>Name</th>
            <th>Email</th>
            <th>Estado</th>
            <th></th>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

<!-- MODAL QUE SE MUESTRA LOS DETALLES DEL ESTUDIANTE DIVIDIR EN COMPONENTE -->
<div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-60">
    <app-single-student (close)="closeDetails()" [selectedUser] = "selectedUser"></app-single-student>
  </div>
