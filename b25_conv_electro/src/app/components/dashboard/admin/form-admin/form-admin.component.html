<div class="flex justify-center">
</div>
  <div class="flex justify-center mb-8">
    <div class="overflow-x-auto">
      <table class="table table-zebra">
        <!-- head -->
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Comentarios</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          <!-- row 1 -->
          @for(comment of comments; track $index){
          <tr>
            <th>{{comment.fecha_notificacion}}</th>
            <td>{{comment.mensaje}}</td>
            @if(comment.leido){
              <td>Notificacion leida</td>
            }@else {
              <td>Notifacion no revisada</td>
            }
            
          </tr>
        }
        </tbody>
      </table>
    </div>
  </div>
<!--   --------CAMPO COMENTARIO----------- -->
  <div class="flex justify-center">
<input id="mensaje" placeholder="Agregar comentario" [formControl] ="mensaje" class="textarea textarea-primary">
<button (click)="sendNotification()" class="btn btn-primary self-end"> ENVIAR</button>
</div>
