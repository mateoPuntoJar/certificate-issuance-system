<!-- Fondo oscuro con desenfoque -->
<div class="fixed inset-0 bg-black/30 backdrop-blur-lg flex items-center justify-center z-50 p-4">
  <!-- Ventana flotante -->
  <div class="bg-white text-neutral-800 p-6 rounded-2xl shadow-2xl max-w-3xl w-full space-y-6 transition-all duration-300">

    <!-- Título principal -->
    <h2 class="text-2xl font-bold text-center">Detalles del Estudiante</h2>

    <!-- Tarjeta del estudiante -->
    <div class="flex justify-center">
      <div class="card w-80 bg-base-100 shadow-xl">
        <div class="card-body items-center text-center">
          <div class="avatar">
            <div class="w-24 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
              <img src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp" />
            </div>
          </div>
          <h2 class="card-title mt-4">{{ selectedUser()?.name }}</h2>
          <p class="text-sm text-gray-500">{{ selectedUser()?.email }}</p>
          <p class="mt-1"><strong>Locación:</strong> {{ selectedUser()?.locacion }}</p>
        </div>
      </div>
    </div>

    <!-- Formulario administrativo -->
    <div class="bg-gray-100 p-4 rounded-xl">
      <app-form-admin></app-form-admin>
    </div>

    <!-- Archivos adjuntos -->
    <div>
      <h3 class="text-primary text-center text-lg font-semibold mb-4">ARCHIVOS ADJUNTOS</h3>
      <div class="flex justify-center">
        <div class="overflow-x-auto rounded-xl border border-base-content/10 bg-base-100 shadow-sm w-full max-w-2xl">
          <table class="table table-zebra">
            <thead>
              <tr>
                <th>#</th>
                <th>Archivo</th>
                <th>Trámite</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>1</td>
                <td>Cy Ganderton</td>
                <td>Quality Control Specialist</td>
                <td><span class="badge badge-info">Blue</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Botones de acción -->
    <div class="flex justify-end space-x-3 pt-2">
      <button class="btn btn-outline btn-secondary" (click)="onClose()">Cerrar</button>
    </div>

  </div>
</div>
